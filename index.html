<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Room</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .tagline {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .card {
      background: #13131a;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 400px;
    }

    /* Setup Screen */
    #setup-screen { display: flex; flex-direction: column; gap: 14px; }

    .name-input {
      background: #1e1e28;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: #7c5cfc; }
    .name-input::placeholder { color: #555; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #444;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .room-input-row {
      display: flex;
      gap: 10px;
    }
    .room-input-row .name-input { flex: 1; }

    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c5cfc, #5b8dee);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: #1e1e28;
      color: #aaa;
      border: 1px solid #333;
    }
    .btn-danger {
      background: #2a1218;
      color: #ff4d6d;
      border: 1px solid #3d1a22;
    }
    .btn-sm {
      padding: 10px 16px;
      width: auto;
      font-size: 0.85rem;
      border-radius: 10px;
    }

    /* Room Screen */
    #room-screen { display: none; flex-direction: column; gap: 16px; }

    .room-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .room-id-box {
      background: #1e1e28;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .room-id-box span { color: #7c5cfc; font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; }
    .copy-hint { font-size: 0.7rem; color: #555; }

    .participants-label {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .participants {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 80px;
    }

    .participant {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1a1a24;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #222;
      transition: border-color 0.3s;
    }
    .participant.speaking { border-color: #7c5cfc; }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c5cfc, #5b8dee);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .avatar.muted { background: #2a2a35; color: #666; }

    .participant-info { flex: 1; }
    .participant-name { font-weight: 600; font-size: 0.95rem; }
    .participant-status { font-size: 0.75rem; color: #555; margin-top: 2px; }

    .mic-icon { font-size: 1.1rem; }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .status-bar {
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      padding: 8px;
    }
    .status-bar.connected { color: #4ade80; }
    .status-bar.error { color: #ff4d6d; }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #222;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .pulse {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>

  <div class="logo">🎙️</div>
  <h1>Voice Room</h1>
  <p class="tagline">Instant voice chat — no app needed</p>

  <div class="card">

    <!-- Setup Screen -->
    <div id="setup-screen">
      <input class="name-input" id="my-name" placeholder="Tumhara naam (jaise: Farid)" maxlength="20" />

      <button class="btn btn-primary" onclick="createRoom()">🚀 Naya Room Banao</button>

      <div class="divider">ya kisi room mein join karo</div>

      <div class="room-input-row">
        <input class="name-input" id="join-room-id" placeholder="Room ID daalo" maxlength="10" />
        <button class="btn btn-secondary btn-sm" onclick="joinRoom()">Join</button>
      </div>

      <div class="status-bar" id="setup-status">Connecting to server...</div>
    </div>

    <!-- Room Screen -->
    <div id="room-screen">
      <div class="room-header">
        <div>
          <div style="font-size:0.75rem;color:#555;margin-bottom:4px;">ROOM ID (tap to copy)</div>
          <div class="room-id-box" onclick="copyRoomId()">
            <span id="display-room-id">----</span>
            <span class="copy-hint">📋 Copy</span>
          </div>
        </div>
        <div class="pulse" id="live-dot"></div>
      </div>

      <div class="participants-label">Participants</div>
      <div class="participants" id="participants-list">
        <div class="empty-state">Koi nahi hai abhi...</div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="mute-btn" onclick="toggleMute()">🎙️ Mute</button>
        <button class="btn btn-danger btn-sm" onclick="leaveRoom()" style="width:auto;padding:14px 18px;">Leave</button>
      </div>

      <div class="status-bar connected" id="room-status">🟢 Connected</div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    let peer = null;
    let myName = '';
    let myStream = null;
    let isMuted = false;
    let roomId = null;
    let connections = {}; // peerId -> { conn, call, name }
    let isHost = false;
    let hostId = null;
    let hostConn = null;

    // Init PeerJS
    function initPeer(customId) {
      const peerConfig = {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
          ]
        },
        debug: 0
      };
      if (customId) peerConfig.id = customId;
      peer = new Peer(peerConfig);

      peer.on('open', (id) => {
        console.log('My peer ID:', id);
        document.getElementById('setup-status').textContent = '✅ Ready to connect';
        document.getElementById('setup-status').className = 'status-bar connected';
      });

      peer.on('error', (err) => {
        showToast('Error: ' + err.message);
        document.getElementById('setup-status').textContent = '❌ ' + err.message;
        document.getElementById('setup-status').className = 'status-bar error';
      });

      // Host receives connections from guests
      peer.on('connection', (conn) => {
        conn.on('open', () => {
          conn.on('data', (data) => {
            if (data.type === 'hello') {
              connections[conn.peer] = connections[conn.peer] || {};
              connections[conn.peer].conn = conn;
              connections[conn.peer].name = data.name;
              addParticipantUI(conn.peer, data.name);
              showToast(data.name + ' joined!');
              // Tell new guest about existing participants
              const others = Object.entries(connections)
                .filter(([id]) => id !== conn.peer)
                .map(([id, c]) => ({ id, name: c.name }));
              conn.send({ type: 'peers', peers: others, hostName: myName });
            }
          });
          conn.on('close', () => {
            const name = connections[conn.peer]?.name || 'Someone';
            removeParticipantUI(conn.peer);
            delete connections[conn.peer];
            showToast(name + ' left');
          });
        });
      });

      // Host receives audio calls from guests
      peer.on('call', (call) => {
        call.answer(myStream);
        call.on('stream', (remoteStream) => {
          playStream(call.peer, remoteStream);
          if (connections[call.peer]) connections[call.peer].call = call;
        });
        call.on('close', () => removeParticipantUI(call.peer));
      });
    }

    async function getMedia() {
      try {
        myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        return true;
      } catch (e) {
        showToast('Mic permission denied!');
        return false;
      }
    }

    async function createRoom() {
      myName = document.getElementById('my-name').value.trim();
      if (!myName) { showToast('Pehle apna naam daalo!'); return; }
      const ok = await getMedia();
      if (!ok) return;

      // Generate 6-char room ID
      roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
      isHost = true;

      initPeer(roomId);
      peer.on('open', () => {
        showRoomScreen();
        addParticipantUI('me', myName + ' (You)', true);
      });
    }

    async function joinRoom() {
      myName = document.getElementById('my-name').value.trim();
      const rid = document.getElementById('join-room-id').value.trim().toUpperCase();
      if (!myName) { showToast('Pehle apna naam daalo!'); return; }
      if (!rid) { showToast('Room ID daalo!'); return; }

      const ok = await getMedia();
      if (!ok) return;

      roomId = rid;
      hostId = rid;
      initPeer();

      peer.on('open', () => {
        // Connect to host for signaling
        hostConn = peer.connect(hostId);
        hostConn.on('open', () => {
          hostConn.send({ type: 'hello', name: myName });
          showRoomScreen();
          addParticipantUI('me', myName + ' (You)', true);

          hostConn.on('data', (data) => {
            if (data.type === 'peers') {
              // Add host
              addParticipantUI(hostId, data.hostName);
              // Connect audio to host
              const call = peer.call(hostId, myStream);
              call.on('stream', (s) => playStream(hostId, s));
              connections[hostId] = { name: data.hostName, call };

              // Connect to other existing peers
              data.peers.forEach(p => {
                addParticipantUI(p.id, p.name);
                const c = peer.call(p.id, myStream);
                c.on('stream', (s) => playStream(p.id, s));
                connections[p.id] = { name: p.name, call: c };
              });
            }
          });
        });

        hostConn.on('close', () => {
          showToast('Host left the room');
          leaveRoom();
        });

        hostConn.on('error', () => {
          showToast('Room not found!');
        });
      });
    }

    function showRoomScreen() {
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('room-screen').style.display = 'flex';
      document.getElementById('display-room-id').textContent = roomId;
    }

    function addParticipantUI(id, name, isMe = false) {
      const list = document.getElementById('participants-list');
      const empty = list.querySelector('.empty-state');
      if (empty) empty.remove();

      if (document.getElementById('p-' + id)) return;

      const initial = name.charAt(0).toUpperCase();
      const div = document.createElement('div');
      div.className = 'participant';
      div.id = 'p-' + id;
      div.innerHTML = `
        <div class="avatar" id="av-${id}">${initial}</div>
        <div class="participant-info">
          <div class="participant-name">${name}</div>
          <div class="participant-status" id="st-${id}">${isMe ? 'You' : 'Connected'}</div>
        </div>
        <div class="mic-icon" id="mic-${id}">🎙️</div>
      `;
      list.appendChild(div);
    }

    function removeParticipantUI(id) {
      const el = document.getElementById('p-' + id);
      if (el) el.remove();
      const list = document.getElementById('participants-list');
      if (list.children.length === 0) {
        list.innerHTML = '<div class="empty-state">Koi nahi hai abhi...</div>';
      }
    }

    function playStream(peerId, stream) {
      let audio = document.getElementById('audio-' + peerId);
      if (!audio) {
        audio = document.createElement('audio');
        audio.id = 'audio-' + peerId;
        audio.autoplay = true;
        document.body.appendChild(audio);
      }
      audio.srcObject = stream;
    }

    function toggleMute() {
      if (!myStream) return;
      isMuted = !isMuted;
      myStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      const btn = document.getElementById('mute-btn');
      const micEl = document.getElementById('mic-me');
      const avEl = document.getElementById('av-me');
      if (isMuted) {
        btn.textContent = '🔇 Unmute';
        btn.style.color = '#ff4d6d';
        if (micEl) micEl.textContent = '🔇';
        if (avEl) avEl.classList.add('muted');
      } else {
        btn.textContent = '🎙️ Mute';
        btn.style.color = '';
        if (micEl) micEl.textContent = '🎙️';
        if (avEl) avEl.classList.remove('muted');
      }
    }

    function leaveRoom() {
      if (myStream) myStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      // Remove all audio elements
      document.querySelectorAll('audio').forEach(a => a.remove());
      // Reset
      connections = {};
      peer = null;
      myStream = null;
      isMuted = false;
      roomId = null;
      isHost = false;
      hostConn = null;

      document.getElementById('room-screen').style.display = 'none';
      document.getElementById('setup-screen').style.display = 'flex';
      document.getElementById('participants-list').innerHTML = '<div class="empty-state">Koi nahi hai abhi...</div>';
      document.getElementById('setup-status').textContent = 'Connecting to server...';
      document.getElementById('setup-status').className = 'status-bar';
      document.getElementById('mute-btn').textContent = '🎙️ Mute';
      document.getElementById('mute-btn').style.color = '';

      // Re-init peer for next session
      initPeer();
    }

    function copyRoomId() {
      navigator.clipboard.writeText(roomId).then(() => {
        showToast('Room ID copied! Share karo 🔗');
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // Init on load
    initPeer();
  </script>
</body>
</html>
